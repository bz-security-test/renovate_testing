name: Update security report

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
    - uses: actions/checkout@v6

    # - name: Login to dhi.io
    #   uses: docker/login-action@v4
    #   with:
    #     registry: dhi.io
    #     username: ${{ secrets.DHI_USERNAME }}
    #     password: ${{ secrets.DHI_PASSWORD }}

    - name: Build and Test via Docker Builder
      run: docker run --rm $(docker build -q --target builder .) go test -v -race ./...

    - name: Build final image for scanning
      run: docker build -t my-app:latest .


    - name: Advanced Image Scan
      uses: crowdstrike/fcs-action@v4.0.0
      with:
        falcon_client_id: ${{ secrets.FALCON_CLIENT_ID }}
        falcon_region: 'us-1'
        scan_type: image
        image: my-app:latest
        minimum_severity: medium
        minimum_exprt: medium
        show_full_description: true
        show_full_detection_details: true
        report_sort_by: severity/desc
        no_color: false
        platform: linux/amd64
        output_path: './scan-results'
        report_formats: sarif
      env:
        FALCON_CLIENT_SECRET: ${{ secrets.FALCON_CLIENT_SECRET }}

    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v4
      if: always()
      with:
        sarif_file: 'scan-results.sarif'
